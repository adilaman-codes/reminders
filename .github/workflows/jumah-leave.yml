name: Jumah Leave Now
on:
  schedule:
    # Offset grid so a run lands exactly on 12:15 IST. Job checks real IST time.
    - cron: '5,15,25,35,45,55 6 * * 5'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Notify only at 12:15 IST
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          # 12:15 IST = 735 minutes. Fire once, within a 10-min window.
          if [ "$NOW" -ge 735 ] && [ "$NOW" -lt 745 ]; then
            curl -s ntfy.sh/Adil-brain \
              -H "Title: LEAVE FOR JUMAH NOW" \
              -H "Priority: urgent" \
              -H "Tags: warning" \
              -d "⚠️ !LEAVE FOR JUM'AH! ⚠️ Move now — 1pm prayer. Don't be late."
          fi
