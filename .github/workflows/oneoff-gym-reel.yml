name: One-off - Gym Reel Check (3pm IST, 30 June)
on:
  schedule:
    - cron: '*/10 9 30 6 *'   # every 10 min, 09:xx UTC, 30 June (3pm IST window)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify only at 15:00 IST
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          if [ "$NOW" -ge 900 ] && [ "$NOW" -lt 910 ]; then   # 15:00 IST = 900 min
            curl -s ntfy.sh/Adil-brain \
              -H "Title: Gym Reel - review the shot list" \
              -d "Gym at 4pm. Open the reel plan: treadmill opener, slow-mo the heavy lifts, lock focus+exposure per shot. Let's get it premium."
          fi
      - name: Self-destruct
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          if [ "$NOW" -ge 900 ] && [ "$NOW" -lt 910 ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git rm .github/workflows/oneoff-gym-reel.yml
            git commit -m "Auto-remove one-off gym reel reminder after firing"
            git push
          fi
