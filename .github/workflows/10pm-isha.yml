name: 10pm Isha Reminder
on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          curl -s ntfy.sh/Adil-brain \
            -H "Title: Isha + Journal" \
            -d "Pray Isha. Then journal."
