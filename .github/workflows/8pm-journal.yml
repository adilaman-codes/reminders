name: 8pm Journal Reminder
on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          curl -s ntfy.sh/Adil-brain \
            -H "Title: Journal Time" \
            -d "Get home, open your journal, and write. 📓"
