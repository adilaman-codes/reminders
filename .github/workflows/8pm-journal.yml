name: 8pm Journal Reminder
on:
  schedule:
    - cron: '*/10 14 * * *'   # every 10 min, 14:xx UTC — IST-gated below to 8:00pm IST
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Notify only at 8:00pm IST
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          if [ "$NOW" -ge 1200 ] && [ "$NOW" -lt 1210 ]; then   # 8:00pm IST = 1200 min
            curl -s ntfy.sh/Adil-brain \
              -H "Title: Journal Time" \
              -d "Get home, open your journal, and write. 📓"
          fi
