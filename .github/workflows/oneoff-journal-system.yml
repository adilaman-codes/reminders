name: Oneoff Journal System Build
on:
  schedule:
    # 13:30 IST on 26 June. Runs every 10 min that hour; job fires at the real IST time, then deletes itself.
    - cron: '*/10 8 26 6 *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Notify at 13:30 IST then self-destruct
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          # 13:30 IST = 810 minutes
          if [ "$NOW" -ge 810 ] && [ "$NOW" -lt 820 ]; then
            curl -s ntfy.sh/Adil-brain \
              -H "Title: Journal accountability system" \
              -d "Time to build the journal logging-vs-reality system with Claude. After practice + study, before 2pm. Let's go."
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git rm .github/workflows/oneoff-journal-system.yml
            git commit -m "Auto-delete fired one-off: journal system build"
            git push
          fi
