name: Oneoff Today Schedule Jul 1
on:
  schedule:
    - cron: '*/10 7-17 1 7 *'   # every 10 min, 07:xx-17:xx UTC, 1 July (IST-gated inside)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fire the right reminder for this IST window
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          fire () { curl -s ntfy.sh/Adil-brain -H "Title: $1" -d "$2"; }

          if   [ "$NOW" -ge 830 ]  && [ "$NOW" -lt 840 ];  then
            fire "Deep Study - A Level Maths" "Books open. 90 min, no phone. Kill the no-study streak. 📚"
          elif [ "$NOW" -ge 940 ]  && [ "$NOW" -lt 950 ];  then
            fire "Ship It - Email, GitHub, Coach" "1) Email the exam officer re: Oct/Nov registration. 2) GitHub profile README (due today). 3) Send coach the weekly upload plan (overdue). 💻"
          elif [ "$NOW" -ge 1030 ] && [ "$NOW" -lt 1040 ]; then
            fire "Get Shots Up" "50 threes + shooting. Slow long-term progression. 🏀"
          elif [ "$NOW" -ge 1110 ] && [ "$NOW" -lt 1120 ]; then
            fire "Money Moves" "Message your first coffee contact + follow up on the Adarsh dad intro. ☕"
          elif [ "$NOW" -ge 1160 ] && [ "$NOW" -lt 1170 ]; then
            fire "Dinner + Reset" "Eat, breathe, get ready for Isha. 🍽️"
          elif [ "$NOW" -ge 1230 ] && [ "$NOW" -lt 1240 ]; then
            fire "Hifz - Al-Baqarah" "Review today's portion of Surah Al-Baqarah. 🕌"
          fi

      - name: Self-destruct after the last window
        run: |
          NOW=$(( $(TZ=Asia/Kolkata date +%-H) * 60 + $(TZ=Asia/Kolkata date +%-M) ))
          if [ "$NOW" -ge 1230 ]; then
            git config user.name "reminders-bot"
            git config user.email "bot@users.noreply.github.com"
            git rm .github/workflows/oneoff-today-schedule.yml
            git commit -m "Auto-delete one-off today schedule after firing"
            git push
          fi
