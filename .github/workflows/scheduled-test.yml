name: Scheduled Test
on:
  schedule:
    - cron: '52 19 24 6 *'   # 19:52 UTC / ~01:22 IST June 25 (one-off test)
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: |
          curl -s ntfy.sh/Adil-brain \
            -H "Title: Scheduled Test Fired" \
            -d "The cloud cron actually works. This fired on a schedule, not a manual push. 🚀"
